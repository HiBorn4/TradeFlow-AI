<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="'Space Mono', monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1f35"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1f2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d4ff" opacity="0.7"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="620" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <ellipse cx="700" cy="150" rx="250" ry="120" fill="#00d4ff" opacity="0.04" filter="url(#softGlow)"/>
  <ellipse cx="200" cy="450" rx="180" ry="100" fill="#7c3aed" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="url(#accentGrad)" filter="url(#glow)">TradeFlow AI - Architecture</text>
  <text x="500" y="58" text-anchor="middle" font-size="11" fill="#64748b">Intelligent Logistics Document Processing Pipeline</text>
  <line x1="200" y1="66" x2="800" y2="66" stroke="url(#accentGrad)" stroke-width="1" opacity="0.3"/>

  <!-- ── ROW 1: User / Frontend ──────────────────────────────── -->
  <!-- USER box -->
  <rect x="30" y="86" width="160" height="72" rx="8" fill="url(#cardGrad)" stroke="#1e2d45" stroke-width="1"/>
  <text x="110" y="110" text-anchor="middle" font-size="20">👤</text>
  <text x="110" y="128" text-anchor="middle" font-size="10" fill="#e2e8f0" font-weight="700">USER</text>
  <text x="110" y="143" text-anchor="middle" font-size="9" fill="#64748b">Uploads PDF</text>

  <!-- Arrow: User → Streamlit -->
  <line x1="192" y1="122" x2="240" y2="122" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6" marker-end="url(#arrow)"/>

  <!-- STREAMLIT box -->
  <rect x="242" y="86" width="200" height="72" rx="8" fill="url(#cardGrad)" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="242" y="86" width="200" height="4" rx="2" fill="url(#accentGrad)" opacity="0.6"/>
  <text x="342" y="108" text-anchor="middle" font-size="9" fill="#00d4ff" letter-spacing="1">FRONTEND</text>
  <text x="342" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">Streamlit UI</text>
  <text x="342" y="140" text-anchor="middle" font-size="9" fill="#64748b">Upload · Chat · Results Dashboard</text>

  <!-- Arrow: Streamlit → FastAPI -->
  <line x1="444" y1="122" x2="496" y2="122" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6" marker-end="url(#arrow)"/>
  <text x="470" y="115" text-anchor="middle" font-size="8" fill="#64748b">HTTP/REST</text>

  <!-- FASTAPI box -->
  <rect x="498" y="86" width="200" height="72" rx="8" fill="url(#cardGrad)" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="498" y="86" width="200" height="4" rx="2" fill="#7c3aed" opacity="0.5"/>
  <text x="598" y="108" text-anchor="middle" font-size="9" fill="#7c3aed" letter-spacing="1">BACKEND</text>
  <text x="598" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">FastAPI Server</text>
  <text x="598" y="140" text-anchor="middle" font-size="9" fill="#64748b">/upload · /chat · /health</text>

  <!-- Arrow: FastAPI → ADK Agent -->
  <line x1="700" y1="122" x2="752" y2="122" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.7" marker-end="url(#arrowPurple)"/>

  <!-- GOOGLE ADK box -->
  <rect x="754" y="86" width="210" height="72" rx="8" fill="url(#cardGrad)" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="754" y="86" width="210" height="4" rx="2" fill="#7c3aed" opacity="0.5"/>
  <text x="859" y="108" text-anchor="middle" font-size="9" fill="#7c3aed" letter-spacing="1">AI ORCHESTRATOR</text>
  <text x="859" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">Google ADK Agent</text>
  <text x="859" y="140" text-anchor="middle" font-size="9" fill="#64748b">LlmAgent · InMemorySession · Runner</text>

  <!-- ── Vertical arrow: ADK → MCP ── -->
  <line x1="859" y1="160" x2="859" y2="215" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6" marker-end="url(#arrowPurple)"/>

  <!-- ── ROW 2: MCP Layer ─────────────────────────────────────── -->
  <!-- MCP SERVER box -->
  <rect x="640" y="218" width="436" height="80" rx="8" fill="url(#cardGrad)" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="640" y="218" width="436" height="4" rx="2" fill="#7c3aed" opacity="0.4"/>
  <text x="858" y="238" text-anchor="middle" font-size="9" fill="#7c3aed" letter-spacing="1">MCP SERVER (FastMCP - stdio)</text>

  <!-- MCP Tool pills -->
  <rect x="654" y="248" width="130" height="20" rx="4" fill="#1e2d45" stroke="#334155" stroke-width="1"/>
  <text x="719" y="262" text-anchor="middle" font-size="8" fill="#94a3b8">classify_document</text>
  <rect x="793" y="248" width="160" height="20" rx="4" fill="#1e2d45" stroke="#334155" stroke-width="1"/>
  <text x="873" y="262" text-anchor="middle" font-size="8" fill="#94a3b8">extract_data_from_pages</text>
  <rect x="963" y="248" width="100" height="20" rx="4" fill="#1e2d45" stroke="#334155" stroke-width="1"/>
  <text x="1013" y="262" text-anchor="middle" font-size="8" fill="#94a3b8">process_e2e</text>

  <text x="858" y="290" text-anchor="middle" font-size="8" fill="#475569">+ get_extracted_json · get_all_extracted_data · get_processing_status · cleanup_workspace</text>

  <!-- ── Vertical arrow: MCP → Pipeline ── -->
  <line x1="858" y1="300" x2="858" y2="345" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- ── ROW 3: AI Pipeline ────────────────────────────────────── -->
  <text x="500" y="340" text-anchor="middle" font-size="9" fill="#64748b" letter-spacing="2">── AI PROCESSING PIPELINE ──────────────────────────────────────────────</text>

  <!-- Step 1: Classification -->
  <rect x="30" y="355" width="200" height="115" rx="8" fill="url(#cardGrad)" stroke="#1e2d45" stroke-width="1"/>
  <rect x="30" y="355" width="200" height="4" rx="2" fill="#10b981" opacity="0.6"/>
  <text x="130" y="374" text-anchor="middle" font-size="9" fill="#10b981" letter-spacing="1">STEP 1</text>
  <text x="130" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">Classification</text>
  <text x="130" y="406" text-anchor="middle" font-size="8.5" fill="#64748b">PDF → 300 DPI PNGs</text>
  <text x="130" y="420" text-anchor="middle" font-size="8.5" fill="#64748b">Tesseract OCR per page</text>
  <text x="130" y="434" text-anchor="middle" font-size="8.5" fill="#64748b">GPT-4.1 page classifier</text>
  <text x="130" y="448" text-anchor="middle" font-size="8.5" fill="#64748b">→ classified_pages/TYPE/</text>
  <text x="130" y="462" text-anchor="middle" font-size="8" fill="#10b981">classification.py</text>

  <!-- Arrow: Step 1 → Step 2 -->
  <line x1="232" y1="412" x2="258" y2="412" stroke="#10b981" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Vision Extraction -->
  <rect x="260" y="355" width="200" height="115" rx="8" fill="url(#cardGrad)" stroke="#1e2d45" stroke-width="1"/>
  <rect x="260" y="355" width="200" height="4" rx="2" fill="#00d4ff" opacity="0.6"/>
  <text x="360" y="374" text-anchor="middle" font-size="9" fill="#00d4ff" letter-spacing="1">STEP 2</text>
  <text x="360" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">Vision Extraction</text>
  <text x="360" y="406" text-anchor="middle" font-size="8.5" fill="#64748b">5 classes in parallel</text>
  <text x="360" y="420" text-anchor="middle" font-size="8.5" fill="#64748b">GPT-4.1 multimodal vision</text>
  <text x="360" y="434" text-anchor="middle" font-size="8.5" fill="#64748b">Structured data extraction</text>
  <text x="360" y="448" text-anchor="middle" font-size="8.5" fill="#64748b">ThreadPoolExecutor async</text>
  <text x="360" y="462" text-anchor="middle" font-size="8" fill="#00d4ff">vision.py</text>

  <!-- Arrow: Step 2 → Step 3 -->
  <line x1="462" y1="412" x2="488" y2="412" stroke="#00d4ff" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Schema Mapping -->
  <rect x="490" y="355" width="200" height="115" rx="8" fill="url(#cardGrad)" stroke="#1e2d45" stroke-width="1"/>
  <rect x="490" y="355" width="200" height="4" rx="2" fill="#f59e0b" opacity="0.6"/>
  <text x="590" y="374" text-anchor="middle" font-size="9" fill="#f59e0b" letter-spacing="1">STEP 3</text>
  <text x="590" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">Schema Mapping</text>
  <text x="590" y="406" text-anchor="middle" font-size="8.5" fill="#64748b">ERPNext JSON schemas</text>
  <text x="590" y="420" text-anchor="middle" font-size="8.5" fill="#64748b">Master Trade Record</text>
  <text x="590" y="434" text-anchor="middle" font-size="8.5" fill="#64748b">Item · Address · Party Site</text>
  <text x="590" y="448" text-anchor="middle" font-size="8.5" fill="#64748b">Transport Handling Unit</text>
  <text x="590" y="462" text-anchor="middle" font-size="8" fill="#f59e0b">schemas/*.json</text>

  <!-- Arrow: Step 3 → Output -->
  <line x1="692" y1="412" x2="718" y2="412" stroke="#f59e0b" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="720" y="355" width="240" height="115" rx="8" fill="url(#cardGrad)" stroke="#10b981" stroke-width="1.5"/>
  <rect x="720" y="355" width="240" height="4" rx="2" fill="#10b981" opacity="0.6"/>
  <text x="840" y="374" text-anchor="middle" font-size="9" fill="#10b981" letter-spacing="1">OUTPUT</text>
  <text x="840" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#e2e8f0">Structured JSON</text>
  <text x="840" y="406" text-anchor="middle" font-size="8.5" fill="#64748b">extracted_data/PackingList/*.json</text>
  <text x="840" y="420" text-anchor="middle" font-size="8.5" fill="#64748b">extracted_data/CommInvoice/*.json</text>
  <text x="840" y="434" text-anchor="middle" font-size="8.5" fill="#64748b">extracted_data/TaxInvoice/*.json</text>
  <text x="840" y="448" text-anchor="middle" font-size="8.5" fill="#64748b">extracted_data/all_extracted_data.json</text>
  <text x="840" y="462" text-anchor="middle" font-size="8" fill="#10b981">ERP-ready structured records</text>

  <!-- ── ROW 4: Document Types ─────────────────────────────────── -->
  <line x1="30" y1="490" x2="970" y2="490" stroke="#1e2d45" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="500" y="506" text-anchor="middle" font-size="9" fill="#64748b" letter-spacing="2">── SUPPORTED DOCUMENT TYPES ─────────────────────────────────────────────</text>

  <!-- Doc type pills -->
  <rect x="30" y="515" width="120" height="24" rx="4" fill="#1e2d45" stroke="#334155" stroke-width="1"/>
  <text x="90" y="531" text-anchor="middle" font-size="9" fill="#94a3b8">📦 Packing List</text>
  <rect x="162" y="515" width="140" height="24" rx="4" fill="#1e2d45" stroke="#334155" stroke-width="1"/>
  <text x="232" y="531" text-anchor="middle" font-size="9" fill="#94a3b8">🧾 Commercial Invoice</text>
  <rect x="314" y="515" width="120" height="24" rx="4" fill="#1e2d45" stroke="#334155" stroke-width="1"/>
  <text x="374" y="531" text-anchor="middle" font-size="9" fill="#94a3b8">🏛️ Tax Invoice</text>
  <rect x="446" y="515" width="140" height="24" rx="4" fill="#1e2d45" stroke="#334155" stroke-width="1"/>
  <text x="516" y="531" text-anchor="middle" font-size="9" fill="#94a3b8">📋 Import Declaration</text>
  <rect x="598" y="515" width="140" height="24" rx="4" fill="#1e2d45" stroke="#334155" stroke-width="1"/>
  <text x="668" y="531" text-anchor="middle" font-size="9" fill="#94a3b8">📝 Package Declaration</text>
  <rect x="750" y="515" width="120" height="24" rx="4" fill="#1e2d45" stroke="#334155" stroke-width="1"/>
  <text x="810" y="531" text-anchor="middle" font-size="9" fill="#94a3b8">🚢 Bill of Lading</text>
  <rect x="882" y="515" width="86" height="24" rx="4" fill="#1e2d45" stroke="#334155" stroke-width="1"/>
  <text x="925" y="531" text-anchor="middle" font-size="9" fill="#94a3b8">🌐 Cert. of Origin</text>

  <!-- ── LLM Models row ─────────────────────────────────────────── -->
  <text x="500" y="572" text-anchor="middle" font-size="9" fill="#334155" letter-spacing="2">── LLMs ────────────────────────────────────────────────────────────────</text>
  <text x="200" y="592" text-anchor="middle" font-size="9" fill="#64748b">🤖 GPT-4.1  &nbsp; (classification + extraction)</text>
  <text x="500" y="592" text-anchor="middle" font-size="9" fill="#64748b">🔮 Gemini 2.0 Flash  (via Google ADK / LiteLLM)</text>
  <text x="800" y="592" text-anchor="middle" font-size="9" fill="#64748b">🛠️ OpenAI-compatible via LiteLLM</text>

  <!-- Corner watermark -->
  <text x="980" y="614" text-anchor="end" font-size="8" fill="#1e2d45" font-style="italic">TradeFlow AI · github.com</text>
</svg>
